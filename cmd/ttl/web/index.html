<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ttl</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <a href="/today" class="brand">ttl</a>
    <nav>
      <a href="/today">Today</a>
      <a href="/inbox">Inbox</a>
      <a href="/upcoming">Upcoming</a>
      <a href="/next">Next</a>
      <a href="/done">Done</a>
      <a href="/trash">Trash</a>
      <a href="/projects">Projects</a>
      <a href="/settings">Settings</a>
    </nav>
    <span class="user" id="user-email"></span>
  </header>
  <main id="main"></main>
  <dialog id="task-dialog">
    <form id="task-edit-form">
      <h3>Edit task</h3><input type="hidden" name="id">
      <label><span>Title</span><input name="title" required></label>
      <label><span>Notes</span><textarea name="notes" rows="5"></textarea></label>
      <label><span>Due</span><input name="due" type="datetime-local"></label>
      <label><span>Priority</span><select name="priority"><option value="0">None</option><option value="1">Low</option><option value="2">Medium</option><option value="3">High</option></select></label>
      <label><span>Tags (comma separated)</span><input name="tags"></label>
      <label><span>Repeat (preset or RRULE)</span><input name="repeat" placeholder="daily, weekdays, weekly, or RRULE:FREQ=..."></label>
      <div class="dialog-actions"><button type="button" class="secondary" data-act="cancel-edit">Cancel</button><button type="submit">Save</button></div>
    </form>
    <hr>
    <form id="subtask-form" class="composer"><input name="title" placeholder="Add subtask"><button>Add</button></form>
    <ul id="subtask-list" class="tasklist"></ul>
    <form id="reminder-form" class="composer"><input name="at" type="datetime-local" required><button>Add reminder</button></form>
  </dialog>
  <script src="/app.js?v=20260713-v1"></script>
  <script>
    // Defensive boot: app.js loads above and (on success) defines
    // window.ttl.{boot,bootAuth}. If anything goes wrong, surface it
    // instead of leaving a blank page.
    (function () {
      function showError(msg) {
        var m = document.getElementById('main');
        if (m) m.innerHTML = '<div class="empty error">' + msg + '</div>';
      }
      try {
        if (!window.ttl || typeof window.ttl.boot !== 'function') {
          // Last resort: render a minimal in-page task list so the
          // user can see *something* even if app.js is broken.
          var m = document.getElementById('main');
          if (m && !m.innerHTML) {
            m.innerHTML =
              '<div class="empty error">' +
                'Failed to load ttl web client (app.js).<br>' +
                'Server build: <code id="ttl-version">unknown</code><br>' +
                '<button onclick="location.reload(true)">Hard refresh</button>' +
              '</div>';
            fetch('/version').then(function(r){return r.json();}).then(function(v){
              var el = document.getElementById('ttl-version');
              if (el) el.textContent = v.version + ' (' + v.built + ')';
            });
          }
        } else {
          window.ttl.boot();
        }
      } catch (e) {
        showError('Boot error: ' + (e && e.message ? e.message : e));
      }
    })();
  </script>
</body>
</html>
