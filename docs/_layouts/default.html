{% if page.url == "/" %}
<script>
  // Install tab switcher + copy buttons. Loaded only on the landing
  // page; the queries return empty NodeLists on other pages, so this
  // is harmless but kept opt-in for cleanliness.
  document.querySelectorAll('.install-tab').forEach((t) => {
    const panels = {
      mac: document.getElementById('cmd-mac'),
      brew: document.getElementById('cmd-brew'),
      build: document.getElementById('cmd-build'),
    };
    t.addEventListener('click', () => {
      document.querySelectorAll('.install-tab').forEach((x) => x.setAttribute('aria-selected', x === t ? 'true' : 'false'));
      Object.entries(panels).forEach(([k, el]) => { if (el) el.hidden = k !== t.dataset.target; });
    });
  });

  document.querySelectorAll('.copy-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const panel = document.getElementById(btn.dataset.copy);
      if (!panel) return;
      const code = panel.querySelector('code').textContent;
      try {
        await navigator.clipboard.writeText(code);
        const old = btn.textContent;
        btn.textContent = 'copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = old; btn.classList.remove('copied'); }, 1400);
      } catch {
        const range = document.createRange();
        range.selectNodeContents(panel.querySelector('code'));
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    });
  });
</script>
{% endif %}

</body>
